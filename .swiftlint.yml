included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  - trailing_whitespace
  - comment_spacing
  - orphaned_doc_comment
  - force_cast
  - trailing_comma
  - switch_case_alignment
  - opening_brace
  - nesting

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional

identifier_name:
  min_length: 1
  max_length: 60

line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 80
  error: 150
